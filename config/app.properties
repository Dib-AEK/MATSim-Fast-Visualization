# Required inputs
matsim.config.file=C:/Users/dabdelkader/Desktop/work/codes/zurich_scenario/zurich_config.xml
cache.dir=cache

# Playback defaults
playback.start.seconds=0
playback.end.seconds=86400
playback.speed=60

# Java2D rendering acceleration
# auto | d3d | opengl | none
render.java2d.pipeline=auto
render.java2d.force.vram=false

# UI defaults
ui.theme.dark=true
ui.color.mode=DEFAULT
ui.show.queues=false
ui.bidirectional.offset=0.45
ui.show.bottleneck=false
ui.bottleneck.divisor=6.0

# Vehicle visibility defaults
ui.keep.vehicles.visible.when.zoomed.out=true
ui.min.vehicle.length.px=3.5
ui.min.vehicle.width.px=1.7

# Vehicle geometry defaults (meters)
ui.vehicle.length.car.m=7.0
ui.vehicle.length.bike.m=3.0
ui.vehicle.length.truck.m=10.0
ui.vehicle.length.bus.m=12.0
ui.vehicle.length.rail.m=30.0

# Vehicle width ratio defaults
ui.vehicle.width.ratio.car=0.70
ui.vehicle.width.ratio.bike=0.30
ui.vehicle.width.ratio.truck=0.95
ui.vehicle.width.ratio.bus=0.85
ui.vehicle.width.ratio.rail=0.90

# Vehicle shape defaults
# RECTANGLE | OVAL | CIRCLE | DIAMOND | TRIANGLE | ARROW
ui.vehicle.shape.car=RECTANGLE
ui.vehicle.shape.bike=DIAMOND
ui.vehicle.shape.truck=RECTANGLE
ui.vehicle.shape.bus=OVAL
ui.vehicle.shape.rail=ARROW

# Recording defaults
recording.default.quality=VIEWPORT_SYNC
